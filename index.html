<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DavidTri — Anything</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --accent: #e8d5a3;
      --accent2: #c9a84c;
      --text: #f0ece4;
      --muted: #6b6660;
      --border: #222;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom Cursor */
    .cursor {
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      width: 40px; height: 40px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transition: width 0.2s ease, height 0.2s ease;
      mix-blend-mode: difference;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* Navigation */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 24px 48px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 100;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, background 0.3s;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      border-color: var(--border);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* Hamburger menu */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 1px;
      background: var(--muted);
      transition: all 0.3s ease;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); background: var(--accent); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); background: var(--accent); }

    /* Mobile nav drawer */
    .mobile-nav {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.98);
      backdrop-filter: blur(20px);
      z-index: 99;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .mobile-nav.open {
      opacity: 1;
      pointer-events: all;
    }
    .mobile-nav a {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: -0.02em;
    }
    .mobile-nav a:hover { color: var(--accent); }

    /* Hero */
    #hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 120px 48px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero-grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(232,213,163,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,213,163,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }

    /* Floating orb bg */
    .hero-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .hero-orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%);
      top: 10%; right: 10%;
    }
    .hero-orb-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(232,213,163,0.07), transparent 70%);
      bottom: 20%; right: 30%;
      animation-delay: -4s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    @keyframes gridShift {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }
    .hero-content { position: relative; max-width: 900px; }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      padding: 6px 14px;
      margin-bottom: 32px;
      animation: fadeUp 0.8s ease both;
    }
    .hero-tag::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.03em;
      animation: fadeUp 0.8s 0.1s ease both;
    }
    .hero-name span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1px var(--accent);
    }
    .hero-desc {
      margin-top: 40px;
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.8;
      letter-spacing: 0.05em;
      animation: fadeUp 0.8s 0.2s ease both;
    }
    .hero-cta {
      margin-top: 48px;
      display: flex; gap: 16px; flex-wrap: wrap;
      animation: fadeUp 0.8s 0.3s ease both;
    }
    .btn {
      padding: 14px 32px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.25s;
      cursor: none;
      display: inline-block;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-2px); }
    .btn-outline {
      border: 1px solid var(--muted);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    .hero-stats {
      position: absolute;
      right: 48px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: fadeUp 0.8s 0.4s ease both;
    }
    .hero-stat {}
    .hero-stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }
    .hero-stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .hero-scroll {
      position: absolute;
      bottom: 48px; right: 48px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      writing-mode: vertical-rl;
      animation: fadeUp 0.8s 0.5s ease both;
      display: flex; align-items: center; gap: 12px;
    }
    .hero-scroll::after {
      content: '';
      width: 1px; height: 60px;
      background: var(--muted);
      animation: scrollLine 1.5s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.5); opacity: 0.3; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Marquee */
    .marquee-section {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      overflow: hidden;
      background: var(--surface);
    }
    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee 20s linear infinite;
    }
    .marquee-track span {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 40px;
    }
    .marquee-track span.accent { color: var(--accent2); }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* Sections */
    section { padding: 100px 48px; }
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 48px;
    }

    /* About */
    #about { border-top: 1px solid var(--border); }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .about-text { line-height: 1.9; color: var(--muted); font-size: 0.85rem; }
    .about-text p + p { margin-top: 20px; }
    .about-text em { color: var(--accent); font-style: normal; }
    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .skill-item {
      background: var(--bg);
      padding: 24px;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }
    .skill-item::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--accent2);
      transition: width 0.3s ease;
    }
    .skill-item:hover { background: var(--surface); }
    .skill-item:hover::after { width: 100%; }
    .skill-item .skill-name {
      font-size: 0.75rem;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }
    .skill-item .skill-cat {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Services section (new) */
    #services {
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .service-card {
      background: var(--surface);
      padding: 40px 32px;
      transition: background 0.3s;
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 0;
      background: linear-gradient(180deg, rgba(201,168,76,0.1), transparent);
      transition: height 0.3s ease;
    }
    .service-card:hover { background: var(--bg); }
    .service-card:hover::before { height: 100%; }
    .service-icon {
      font-size: 2rem;
      margin-bottom: 20px;
      display: block;
    }
    .service-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }
    .service-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .service-num {
      position: absolute;
      top: 32px; right: 32px;
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--border);
      line-height: 1;
      transition: color 0.3s;
    }
    .service-card:hover .service-num { color: rgba(201,168,76,0.15); }

    /* Projects */
    #projects { border-top: 1px solid var(--border); }
    .projects-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .project-item {
      background: var(--bg);
      padding: 40px;
      display: grid;
      grid-template-columns: 60px 1fr auto auto;
      gap: 32px;
      align-items: center;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
    }
    .project-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      background: var(--accent2);
      transition: width 0.3s ease;
      opacity: 0.15;
    }
    .project-item:hover { background: var(--surface); }
    .project-item:hover::before { width: 4px; }
    .project-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--border);
      font-weight: 900;
      transition: color 0.2s;
    }
    .project-item:hover .project-num { color: var(--accent2); }
    .project-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .project-item:hover .project-name { color: var(--accent); }
    .project-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .project-tag {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 10px;
      transition: border-color 0.2s, color 0.2s;
    }
    .project-item:hover .project-tag { border-color: rgba(201,168,76,0.3); color: var(--accent2); }
    .project-year {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .project-arrow {
      font-size: 1.5rem;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
    }
    .project-item:hover .project-arrow { color: var(--accent); transform: translate(4px, -4px); }

    /* Testimonial / Quote section (new) */
    #quote {
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 48px;
    }
    .big-quote {
      max-width: 800px;
    }
    .big-quote blockquote {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 3.5vw, 3rem);
      font-style: italic;
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
      position: relative;
    }
    .big-quote blockquote::before {
      content: '"';
      font-size: 8rem;
      color: var(--accent2);
      opacity: 0.15;
      position: absolute;
      top: -40px; left: -20px;
      line-height: 1;
      font-style: normal;
    }
    .quote-author {
      margin-top: 32px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .quote-author span { color: var(--accent2); }

    /* Contact */
    #contact {
      border-top: 1px solid var(--border);
      text-align: center;
      background: var(--surface);
    }
    #contact .section-title { margin-bottom: 16px; }
    .contact-sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }
    .contact-email {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 3rem);
      color: var(--accent);
      text-decoration: none;
      font-style: italic;
      transition: color 0.2s, letter-spacing 0.3s;
      display: inline-block;
    }
    .contact-email:hover { color: var(--accent2); letter-spacing: 0.02em; }

    /* Contact form (new) */
    .contact-form-wrap {
      margin-top: 64px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      appearance: none;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent2); }
    .form-group textarea { min-height: 120px; }
    .form-submit {
      width: 100%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 16px;
      cursor: none;
      transition: background 0.25s, transform 0.2s;
      margin-top: 8px;
    }
    .form-submit:hover { background: var(--accent2); transform: translateY(-2px); }
    .form-success {
      display: none;
      text-align: center;
      padding: 32px;
      border: 1px solid var(--accent2);
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      line-height: 1.8;
    }

    .socials {
      margin-top: 56px;
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .social-link {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .social-link::before {
      content: '';
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .social-link:hover { color: var(--accent); }
    .social-link:hover::before { background: var(--accent); }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer .copy {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    footer .made {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    footer .made span { color: var(--accent2); }

    /* Back to top */
    .back-top {
      position: fixed;
      bottom: 40px;
      right: 48px;
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
      opacity: 0;
      pointer-ev
